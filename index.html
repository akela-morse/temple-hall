<!DOCTYPE html>
<html lang="en-US">

<head>
	<meta charset="UTF-8">
	<meta property="og:title" content="">
	<meta property="og:description" content="">
	<meta property="og:image" content="">
	<meta property="og:type" content="article">
	<meta property="og:site_name" content="Temple Maker 64">
	<link rel="icon" type="image/x-icon" href="favicon.ico">
	<title>Entering a Temple...</title>
	<script>
		const metas = Array.from(document.getElementsByTagName('meta'));

		const metaTitle = metas.find(m => m.attributes[0].nodeValue === 'og:title');

		const metaImage = metas.find(m => m.attributes[0].nodeValue === 'og:image');

		const metaDescription = metas.find(m => m.attributes[0].nodeValue === 'og:description');

		setTimeout(() => {

			metaTitle.attributes[1].nodeValue = 'a title';
			metaDescription.attributes[1].nodeValue = 'a description';
			metaImage.attributes[1].nodeValue = 'a image';

		}, 4000);

		// const url = new URL(window.location.href);

		// const templeId = url.searchParams.get("id");

		// window.location.replace("temple64:" + templeId);

		// setTimeout(window.close, 10000);
	</script>
	<noscript>
		<style>
			.jsonly {
				display: none !important;
			}
		</style>
	</noscript>
	<style>
		@font-face {
			font-family: 'Kelvinch';
			src: url('kelv.otf') format('opentype');
		}

		@keyframes textAnim {
			from {
				opacity: 0;
				letter-spacing: 0%;
			}

			to {
				opacity: 1;
				letter-spacing: 5%;
			}
		}

		body {
			background-color: darkslategray;
			background-image: url('background.jpg');
			background-size: cover;
		}

		div {
			height: 100%;
			width: 100%;
			display: flex;
			position: fixed;
			align-items: center;
			justify-content: center;
		}

		p {
			color: whitesmoke;
			font: 700 4em 'Kelvinch';
			text-align: center;
			text-shadow: 0 -2px 10px #ff0, 0 -10px 20px #ff8000, 0 -18px 40px #F00, 0px 0px 20px #000000, 0px 0px 20px #000000;
			animation-name: textAnim;
			animation-duration: 2s;
			animation-fill-mode: forwards;
		}

		a {
			color: whitesmoke;
		}
	</style>
</head>

<body>
	<div>
		<p class="jsonly">
			Prepare to enter the Temple
		</p>
		<noscript>
			<p>
				Javascript disabled, you must <a href="temple64://">enter manually</a>
			</p>
		</noscript>
	</div>
</body>

</html>
